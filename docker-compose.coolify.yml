services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-xhfsbocdu1b8p9e7d144zz9u}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-default}
      DB_USER: ${DB_USER:-mysql}
      DB_PASS: ${DB_PASS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://safrion.store,https://www.safrion.store,http://safrion.store,http://www.safrion.store}
    command: >
      sh -lc "php tools/create_db.php && php tools/run_migrations.php && php tools/seed.php && exec apache2-foreground"
    expose:
      - "80"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

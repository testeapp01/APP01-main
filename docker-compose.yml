services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-safrion}
      - DB_ADMIN_USER=${DB_ADMIN_USER:-root}
      - DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_NAME=${ADMIN_NAME:-admin}
      - APP_SKIP_BOOTSTRAP=${APP_SKIP_BOOTSTRAP:-0}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - OPS_TOKEN=${OPS_TOKEN}
      - TRUSTED_PROXY_CIDR=${TRUSTED_PROXY_CIDR:-172.16.0.0/12}
      - APP_DOMAIN=${APP_DOMAIN:-safrion.store}
      - API_DOMAIN=${API_DOMAIN:-api.safrion.store}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend_external.rule=Host(`${API_DOMAIN:-api.safrion.store}`)"
      - "traefik.http.routers.backend_external.priority=90"
      - "traefik.http.routers.backend_external.service=backend"
      - "traefik.http.routers.backend_external.tls=true"
      - "traefik.http.routers.backend_external.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      - "traefik.http.routers.backend_api_from_frontend.rule=(Host(`safrion.store`) || Host(`www.safrion.store`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend_api_from_frontend.priority=100"
      - "traefik.http.routers.backend_api_from_frontend.service=backend"
      - "traefik.http.routers.backend_api_from_frontend.tls=true"
      - "traefik.http.routers.backend_api_from_frontend.tls.certresolver=letsencrypt"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`safrion.store`) || Host(`www.safrion.store`)"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  db:
    image: mysql:8.0
    restart: always
    container_name: safrion_v1_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ADMIN_PASSWORD}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: ${DB_NAME:-safrion}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: